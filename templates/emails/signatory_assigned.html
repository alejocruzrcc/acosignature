<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Documento asignado para firma</title>
</head>
<body style="font-family: Arial, sans-serif; color: #1f2937; line-height: 1.5;">
  <div style="margin:0 0 14px">
    <img
      src="{{ brand_logo_url }}"
      alt="Indico Constructora"
      width="200"
      height="36"
      style="display:block;max-width:220px;height:auto;border:0;outline:none;text-decoration:none"
    />
  </div>
  <p>Hola {{ recipient_name }},</p>
  <p>Se te asigno un nuevo documento para firma.</p>

  <p>
    <strong>Documento:</strong> {{ document_title }}<br>
    <strong>Asignado por:</strong> {{ assigned_by_name }}
    {% if document_description %}<br><strong>Descripcion:</strong> {{ document_description }}{% endif %}
  </p>

  <p>
    <a href="{{ document_url }}" style="display:inline-block;padding:10px 14px;background:#f5a623;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:700;">
      Revisar documento
    </a>
  </p>

  <p style="font-size: 12px; color: #6b7280;">
    Si no reconoces este correo, puedes ignorarlo.
  </p>
</body>
</html>
