<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if document_title %}{{ document_title }} · {% endif %}Vista previa</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f1f5f9; color: #334155; font-family: Montserrat, system-ui, sans-serif; }
    .top {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 10px 12px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      font-size: 13px;
      font-weight: 700;
    }
    .top.err { color: #b91c1c; }
    #pdf-pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 12px;
      padding-bottom: 24px;
    }
    canvas {
      max-width: 100%;
      height: auto;
      display: block;
      background: #fff;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      border-radius: 4px;
    }
    .page-placeholder {
      width: min(100%, 960px);
      min-height: 120px;
      background: #e2e8f0;
      border-radius: 4px;
    }
    .msg { padding: 24px 16px; text-align: center; line-height: 1.5; }
    .msg.err { color: #b91c1c; }
  </style>
</head>
<body>
{% if error == 'no_file' %}
  <p class="msg err">El archivo del documento no está disponible.</p>
{% elif error == 'no_session' %}
  <p class="msg err">No hay una firma pendiente de confirmar. Vuelve al paso anterior.</p>
{% else %}
  <div class="top" id="pdf-status">Cargando documento…</div>
  <div id="pdf-pages"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      var pdfUrl = '{{ pdf_fetch_url|escapejs }}';
      var statusEl = document.getElementById('pdf-status');
      var pagesEl = document.getElementById('pdf-pages');
      var INITIAL_PAGES = 2;

      function start() {
        if (!pdfUrl || typeof pdfjsLib === 'undefined') {
          if (statusEl) {
            statusEl.textContent = 'No se pudo iniciar el visor PDF.';
            statusEl.className = 'top err';
          }
          return;
        }
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        function maxCanvasWidth() {
          return Math.min(window.innerWidth - 24, 960);
        }

        function renderPage(pdf, num, maxW) {
          return pdf.getPage(num).then(function (page) {
            var base = page.getViewport({ scale: 1 });
            var scale = maxW / base.width;
            var viewport = page.getViewport({ scale: scale });
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d', { alpha: false });
            canvas.width = Math.floor(viewport.width);
            canvas.height = Math.floor(viewport.height);
            canvas.style.width = Math.floor(viewport.width) + 'px';
            canvas.style.height = Math.floor(viewport.height) + 'px';
            var slot = pagesEl.children[num - 1];
            if (slot) {
              slot.replaceWith(canvas);
            } else {
              pagesEl.appendChild(canvas);
            }
            return page.render({
              canvasContext: ctx,
              viewport: viewport,
            }).promise;
          });
        }

        function renderAllPages(pdf) {
          var maxW = maxCanvasWidth();
          var total = pdf.numPages;
          for (var p = 1; p <= total; p++) {
            var ph = document.createElement('div');
            ph.className = 'page-placeholder';
            ph.setAttribute('aria-hidden', 'true');
            pagesEl.appendChild(ph);
          }

          var firstBatch = Math.min(INITIAL_PAGES, total);
          statusEl.textContent = 'Mostrando primeras ' + firstBatch + ' de ' + total + ' página(s)…';

          var seq = Promise.resolve();
          for (var i = 1; i <= firstBatch; i++) {
            (function (n) {
              seq = seq.then(function () {
                return renderPage(pdf, n, maxW);
              });
            })(i);
          }
          seq = seq.then(function () {
            if (total <= firstBatch) {
              statusEl.textContent = 'Listo · ' + total + ' página(s)';
              return;
            }
            statusEl.textContent = 'Cargando páginas restantes…';
            for (var j = firstBatch + 1; j <= total; j++) {
              (function (n) {
                seq = seq.then(function () {
                  return renderPage(pdf, n, maxW);
                });
              })(j);
            }
            return seq.then(function () {
              statusEl.textContent = 'Listo · ' + total + ' página(s)';
            });
          });
          return seq;
        }

        pdfjsLib
          .getDocument({ url: pdfUrl, withCredentials: true })
          .promise.then(function (pdf) {
            return renderAllPages(pdf);
          })
          .catch(function () {
            statusEl.textContent = 'No se pudo cargar el PDF';
            statusEl.className = 'top err';
            pagesEl.innerHTML =
              '<p class="msg err">Si estás en el móvil, prueba también “Abrir en nueva pestaña” desde la página del documento.</p>';
          });
      }

      if (typeof pdfjsLib !== 'undefined') {
        start();
      } else {
        window.addEventListener('load', start);
      }
    })();
  </script>
{% endif %}
</body>
</html>
